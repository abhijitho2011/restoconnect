version: 1
applications:
  - appRoot: frontend_admin_flutter
    frontend:
      phases:
        preBuild:
          commands:
            - git clone https://github.com/flutter/flutter.git -b stable
            - export PATH="$PATH:`pwd`/flutter/bin"
            - flutter upgrade
            - flutter config --enable-web
        build:
          commands:
            - flutter pub get
            - flutter build web --release --dart-define=API_BASE_URL=$API_BASE_URL --dart-define=SOCKET_URL=$SOCKET_URL
      artifacts:
        baseDirectory: build/web
        files:
          - '**/*'
      cache:
        paths:
          - flutter/**/*
          - .dart_tool/**/*

